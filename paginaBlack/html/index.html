<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collage 16 Imágenes</title>

  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px;
  flex-direction: column;
}

/* Título */
h1 {
  color: #fff;
  margin-bottom: 25px;
  font-size: 28px;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* Contenedor */
.collage {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 180px;
  gap: 15px;
  width: 90%;
  max-width: 1000px;
  padding: 20px;
  border-radius: 20px;

  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(12px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}

/* Imágenes */
.collage img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 14px;

  transition: all 0.4s ease;
  cursor: pointer;

  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* Hover con profundidad */
.collage img:hover {
  transform: scale(1.08) translateY(-5px);
  filter: brightness(1.2) contrast(1.1);
  box-shadow: 0 15px 30px rgba(0,0,0,0.8);
  z-index: 2;
}

/* 🔥 Variación de tamaños (más dinámico) */
.collage img:nth-child(1),
.collage img:nth-child(5),
.collage img:nth-child(9),
.collage img:nth-child(13) {
  grid-column: span 2;
  grid-row: span 2;
}

/* Botón flotante */
.btn-modern {
  position: fixed;
  bottom: 25px;
  left: 25px;

  display: inline-flex;
  align-items: center;
  gap: 8px;

  padding: 12px 20px;
  background: linear-gradient(135deg, #ffffff, #cccccc);
  color: #111;

  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;

  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.btn-modern:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.7);
}

/* Responsive */
@media (max-width: 768px) {
  .collage {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 140px;
  }
}

@media (max-width: 480px) {
  .collage {
    grid-template-columns: 1fr;
    grid-auto-rows: 120px;
  }
}

  </style>
</head>

<body>

  <h1>DANIEL SALINAS CARDENAS</h1>

  <div class="collage">
    <img src="/img/daniel/daniel_1.webp">
    <img src="/img/daniel/daniel_2.webp">
    <img src="/img/daniel/daniel_3.webp">
    <img src="/img/daniel/daniel_4.webp">
    <img src="/img/daniel/daniel_5.webp">
    <img src="/img/daniel/daniel_6.webp">
    <img src="/img/daniel/daniel_7.webp">
    <img src="/img/daniel/daniel_8.webp">
    <img src="/img/daniel/daniel_9.webp">
    <img src="/img/daniel/daniel_10.webp">
    <img src="/img/daniel/daniel_11.webp">
    <img src="/img/daniel/daniel_12.webp">
    <img src="/img/daniel/daniel_13.webp">
    <img src="/img/daniel/daniel_14.webp">
    <img src="/img/daniel/daniel_15.webp">
    <img src="/img/daniel/daniel_16.webp">
  </div>

  <a href="https://black-team.vercel.app" class="btn-modern">
    ⬅ Volver
  </a>

</body>
</html>
